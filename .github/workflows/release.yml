name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Frontend Tests ──────────────────────────────────────────────────
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

  # ── Rust Tests (3-OS matrix) ────────────────────────────────────────
  test-rust:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
          - os: ubuntu-22.04
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

  # ── Build (4-target matrix) ─────────────────────────────────────────
  build:
    needs: [test-frontend, test-rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            platform_key: darwin-aarch64
            sign: true
            notarize: true
          - target: x86_64-apple-darwin
            runner: macos-14
            platform_key: darwin-x86_64
            sign: true
            notarize: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            platform_key: linux-x86_64
            sign: false
            notarize: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform_key: windows-x86_64
            sign: false
            notarize: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - run: npm ci

      - name: Validate version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CONF_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match tauri.conf.json version $CONF_VERSION"
            exit 1
          fi

      - name: Import macOS signing certificate
        if: matrix.sign && runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and sign
        shell: bash
        env:
          CI: false
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "${{ matrix.sign && 'Developer ID Application: Gabriel Anhaia da Silva (4987F43NL6)' || '' }}"
        run: npx tauri build --target ${{ matrix.target }}

      - name: Notarize DMG
        if: matrix.notarize
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG_PATH=$(ls src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg)
          NOTARIZED=false
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt of 3..."
            if xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 8m; then
              NOTARIZED=true
              break
            fi
            echo "Attempt $attempt failed."
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 15s..."
              sleep 15
            fi
          done
          if [ "$NOTARIZED" != "true" ]; then
            echo "::error::All 3 notarization attempts failed"
            exit 1
          fi
          xcrun stapler staple "$DMG_PATH"

      - name: Collect installer artifacts
        shell: bash
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          INSTALLER_DIR="installer-artifacts"
          mkdir -p "$INSTALLER_DIR"

          # macOS DMG
          if ls "$TARGET_DIR"/dmg/*.dmg 2>/dev/null; then
            cp "$TARGET_DIR"/dmg/*.dmg "$INSTALLER_DIR/"
          fi

          # Linux AppImage and deb
          if ls "$TARGET_DIR"/appimage/*.AppImage 2>/dev/null; then
            cp "$TARGET_DIR"/appimage/*.AppImage "$INSTALLER_DIR/"
          fi
          if ls "$TARGET_DIR"/deb/*.deb 2>/dev/null; then
            cp "$TARGET_DIR"/deb/*.deb "$INSTALLER_DIR/"
          fi

          # Windows NSIS and MSI
          if ls "$TARGET_DIR"/nsis/*.exe 2>/dev/null; then
            cp "$TARGET_DIR"/nsis/*.exe "$INSTALLER_DIR/"
          fi
          if ls "$TARGET_DIR"/msi/*.msi 2>/dev/null; then
            cp "$TARGET_DIR"/msi/*.msi "$INSTALLER_DIR/"
          fi

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-ide-${{ matrix.platform_key }}-installer
          path: installer-artifacts/

      - name: Collect updater artifacts
        shell: bash
        run: |
          TARGET_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          UPDATER_DIR="updater-artifacts"
          mkdir -p "$UPDATER_DIR"

          # macOS updater bundle
          if ls "$TARGET_DIR"/macos/*.tar.gz 2>/dev/null; then
            cp "$TARGET_DIR"/macos/*.tar.gz "$UPDATER_DIR/"
            cp "$TARGET_DIR"/macos/*.tar.gz.sig "$UPDATER_DIR/" 2>/dev/null || true
          fi

          # Linux updater bundle
          if ls "$TARGET_DIR"/appimage/*.AppImage.tar.gz 2>/dev/null; then
            cp "$TARGET_DIR"/appimage/*.AppImage.tar.gz "$UPDATER_DIR/"
            cp "$TARGET_DIR"/appimage/*.AppImage.tar.gz.sig "$UPDATER_DIR/" 2>/dev/null || true
          fi

          # Windows updater bundle
          if ls "$TARGET_DIR"/nsis/*.nsis.zip 2>/dev/null; then
            cp "$TARGET_DIR"/nsis/*.nsis.zip "$UPDATER_DIR/"
            cp "$TARGET_DIR"/nsis/*.nsis.zip.sig "$UPDATER_DIR/" 2>/dev/null || true
          fi

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-ide-${{ matrix.platform_key }}-updater
          path: updater-artifacts/

  # ── Assemble Release ────────────────────────────────────────────────
  assemble-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          RELEASE_DIR="release-files"
          mkdir -p "$RELEASE_DIR"

          echo "=== Downloaded artifacts ==="
          find artifacts/ -type f | sort

          # Copy all installer files
          for dir in artifacts/hermes-ide-*-installer; do
            if [ -d "$dir" ]; then
              cp "$dir"/* "$RELEASE_DIR/" 2>/dev/null || true
            fi
          done

          # Copy updater bundles with platform prefix to avoid name collisions
          # (both macOS targets produce HERMES-IDE.app.tar.gz)
          for dir in artifacts/hermes-ide-*-updater; do
            if [ -d "$dir" ]; then
              PLATFORM_KEY=$(basename "$dir" | sed 's/hermes-ide-//' | sed 's/-updater//')
              for file in "$dir"/*; do
                if [ -f "$file" ]; then
                  BASENAME=$(basename "$file")
                  cp "$file" "$RELEASE_DIR/${PLATFORM_KEY}-${BASENAME}"
                fi
              done
            fi
          done

          echo "=== Release files ==="
          ls -la "$RELEASE_DIR/"

      - name: Generate update manifest (latest.json)
        run: |
          RELEASE_DIR="release-files"
          BASE_URL="https://github.com/Vinci-26/hermes-ide-releases/releases/download/v${VERSION}"

          # Helper: find bundle file and its corresponding .sig for a platform
          # Uses the bundle glob to derive the exact .sig path (avoids mismatches)
          find_bundle_file() {
            local pattern="$1"
            ls ${RELEASE_DIR}/${pattern} 2>/dev/null | grep -v '\.sig$' | head -1
          }

          # Build platforms JSON safely using jq (handles multi-line sigs, special chars)
          PLATFORMS_JSON='{}'

          add_platform() {
            local key="$1" bundle_glob="$2"
            local bundle_file sig_content bundle_name
            bundle_file=$(find_bundle_file "$bundle_glob")
            if [ -n "$bundle_file" ] && [ -f "$bundle_file" ]; then
              bundle_name=$(basename "$bundle_file")
              sig_content=""
              if [ -f "${bundle_file}.sig" ]; then
                sig_content=$(cat "${bundle_file}.sig")
              fi
              PLATFORMS_JSON=$(echo "$PLATFORMS_JSON" | jq \
                --arg k "$key" \
                --arg sig "$sig_content" \
                --arg url "${BASE_URL}/${bundle_name}" \
                '.[$k] = {signature: $sig, url: $url}')
            fi
          }

          add_platform "darwin-aarch64" "darwin-aarch64-*.tar.gz"
          add_platform "darwin-x86_64"  "darwin-x86_64-*.tar.gz"
          add_platform "linux-x86_64"   "linux-x86_64-*.AppImage.tar.gz"
          add_platform "windows-x86_64" "windows-x86_64-*.nsis.zip"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the full changelog at https://hermes-ide.com/changelog" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --argjson platforms "$PLATFORMS_JSON" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > "$RELEASE_DIR/latest.json"

          echo "=== latest.json ==="
          cat "$RELEASE_DIR/latest.json"

      - name: Create GitHub Release on releases repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          TAG="v${VERSION}"
          REPO="Vinci-26/hermes-ide-releases"
          RELEASE_DIR="release-files"

          # Collect files safely (nullglob prevents literal glob on empty dir)
          shopt -s nullglob
          FILES=( "$RELEASE_DIR"/* )
          shopt -u nullglob

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "::error::No release files found. All builds may have failed."
            exit 1
          fi

          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Hermes IDE $TAG" \
            --notes "Download the installer for your platform, or update in-app. Full changelog: https://hermes-ide.com/changelog" \
            "${FILES[@]}"
