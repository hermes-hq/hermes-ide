name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

  build:
    needs: test
    runs-on: macos-14
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Validate version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CONF_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match tauri.conf.json version $CONF_VERSION"
            exit 1
          fi

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          echo -n "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build and sign
        env:
          CI: false
          APPLE_SIGNING_IDENTITY: "Developer ID Application: Gabriel Anhaia da Silva (4987F43NL6)"
        run: npx tauri build --target aarch64-apple-darwin

      - name: Notarize DMG
        timeout-minutes: 30
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          NOTARIZED=false
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt of 3..."
            if xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait --timeout 8m; then
              NOTARIZED=true
              break
            fi
            echo "Attempt $attempt failed."
            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 15s..."
              sleep 15
            fi
          done
          if [ "$NOTARIZED" != "true" ]; then
            echo "::error::All 3 notarization attempts failed"
            exit 1
          fi
          xcrun stapler staple "$DMG_PATH"

      - name: Collect release artifacts
        id: artifacts
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          DMG_PATH=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg)
          echo "dmg=$DMG_PATH" >> "$GITHUB_OUTPUT"

          # The updater bundle (.tar.gz) and signature (.sig) are generated by tauri-plugin-updater
          UPDATE_BUNDLE=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz 2>/dev/null || true)
          UPDATE_SIG=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz.sig 2>/dev/null || true)
          echo "update_bundle=$UPDATE_BUNDLE" >> "$GITHUB_OUTPUT"
          echo "update_sig=$UPDATE_SIG" >> "$GITHUB_OUTPUT"

      - name: Generate update manifest (latest.json)
        run: |
          VERSION="${{ steps.artifacts.outputs.version }}"
          SIG_FILE="${{ steps.artifacts.outputs.update_sig }}"
          SIGNATURE=""
          if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
            SIGNATURE=$(cat "$SIG_FILE")
          fi

          BUNDLE_NAME=$(basename "${{ steps.artifacts.outputs.update_bundle }}")
          DOWNLOAD_URL="https://github.com/gabrielanhaia/hermes-ide-releases/releases/download/v${VERSION}/${BUNDLE_NAME}"

          cat > latest.json <<MANIFEST
          {
            "version": "${VERSION}",
            "notes": "See the full changelog at https://hermes-ide.com/changelog",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          MANIFEST

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-ide-release-v${{ steps.artifacts.outputs.version }}
          path: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.update_bundle }}
            latest.json

      - name: Create GitHub Release on releases repo
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.RELEASES_REPO_TOKEN }}
        run: |
          VERSION="${{ steps.artifacts.outputs.version }}"
          TAG="v${VERSION}"
          REPO="gabrielanhaia/hermes-ide-releases"

          # Create the release
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "Hermes IDE $TAG" \
            --notes "Download the DMG for a fresh install, or update in-app. Full changelog: https://hermes-ide.com/changelog" \
            "${{ steps.artifacts.outputs.dmg }}" \
            latest.json

          # Also upload the update bundle if it exists
          if [ -n "${{ steps.artifacts.outputs.update_bundle }}" ]; then
            gh release upload "$TAG" \
              --repo "$REPO" \
              "${{ steps.artifacts.outputs.update_bundle }}"
          fi
