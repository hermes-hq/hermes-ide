name: Thank New Sponsors

on:
  sponsorship:
      types:
            - created
                  - tier_changed

                  jobs:
                    thank-sponsor:
                        runs-on: ubuntu-latest
                            permissions:
                                  issues: write

                                      steps:
                                            - name: Thank new sponsor
                                                    uses: actions/github-script@v7
                                                            with:
                                                                      github-token: ${{ secrets.GITHUB_TOKEN }}
                                                                                script: |
                                                                                            const sponsor = context.payload.sponsorship?.sponsor?.login || 'friend';
                                                                                                        const tier = context.payload.sponsorship?.tier?.name || 'Supporter';
                                                                                                                    const monthlyAmount = context.payload.sponsorship?.tier?.monthly_price_in_dollars || 0;
                                                                                                                                const isNew = context.payload.action === 'created';
                                                                                                                                
                                                                                                                                            const message = isNew
                                                                                                                                                          ? `## 💛 Thank you for sponsoring Hermes IDE, @${sponsor}!
                                                                                                                                                          
                                                                                                                                                                      We're thrilled to have you as a **${tier}** sponsor ($${monthlyAmount}/month)!
                                                                                                                                                                      
                                                                                                                                                                                  Your support directly helps us:
                                                                                                                                                                                              - 🧠 Build smarter AI integrations
                                                                                                                                                                                                          - ⚡ Improve performance and stability
                                                                                                                                                                                                                      - 🖥️ Maintain macOS, Windows & Linux support
                                                                                                                                                                                                                                  - 📦 Develop the plugin ecosystem
                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                              **What's next:**
                                                                                                                                                                                                                                                          - Join our [Discord community](https://discord.gg/vMQXSTY6BM) and introduce yourself in #sponsors
                                                                                                                                                                                                                                                                      - Watch the repo for early release announcements
                                                                                                                                                                                                                                                                                  - Your name will appear in the next release notes
                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                              Thank you for believing in Hermes IDE. We build this for developers like you. 🚀
                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                          — The Hermes IDE Team`
                                                                                                                                                                                                                                                                                                                        : `## 🎉 Thank you for upgrading your sponsorship, @${sponsor}!
                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                    You've upgraded to the **${tier}** tier ($${monthlyAmount}/month) — that means the world to us!
                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                Your increased support unlocks even more development time for Hermes IDE.
                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                            — The Hermes IDE Team`;
                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                        // Post a thank-you issue comment (public thank-you)
                                                                                                                                                                                                                                                                                                                                                                                    await github.rest.issues.create({
                                                                                                                                                                                                                                                                                                                                                                                                  owner: context.repo.owner,
                                                                                                                                                                                                                                                                                                                                                                                                                repo: context.repo.repo,
                                                                                                                                                                                                                                                                                                                                                                                                                              title: `💛 Thank you, @${sponsor}!`,
                                                                                                                                                                                                                                                                                                                                                                                                                                            body: message,
                                                                                                                                                                                                                                                                                                                                                                                                                                                          labels: ['sponsor']
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  console.log(`Thank-you issued for @${sponsor} at ${tier} tier.`);
