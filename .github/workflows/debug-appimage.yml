name: Debug AppImage

# Manual diagnostic workflow.
#
# Why this exists: in v1.1.3 we shipped the Claude Agent SDK runtime as
# a 210MB Tauri resource (`bridge/node_modules`).  linuxdeploy fails to
# bundle that tree into an AppImage on both x86_64 and aarch64, but
# Tauri's bundler swallows linuxdeploy's stderr — the only error we
# see is "failed to run linuxdeploy" with no underlying cause.
#
# This workflow:
#   1. Checks out the current main.
#   2. Stages the bridge runtime (same as a normal release build).
#   3. Runs `tauri build --bundles appimage --verbose` with maximum
#      logging env vars set so linuxdeploy's actual error reaches the
#      job logs.
#
# Use the captured output to decide whether AppImage can be unblocked
# without the architectural fix (ADR 002 — tarball-extract on first
# launch) or whether ADR 002 is required.

on:
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture to debug (x86_64 or aarch64)"
        required: true
        default: "x86_64"
        type: choice
        options:
          - x86_64
          - aarch64

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # Maximum verbosity from Tauri bundler + cargo + AppImage tooling.
  RUST_LOG: "tauri_bundler=trace,info"
  RUST_BACKTRACE: "full"
  # linuxdeploy itself respects DEBUG=1 in its plugin scripts.
  DEBUG: "1"
  # AppImageTool: avoid sandbox issues that fail silently in CI.
  APPIMAGE_EXTRACT_AND_RUN: "1"
  NO_STRIP: "1"

jobs:
  debug:
    runs-on: ${{ inputs.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-22.04' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libfuse2 file desktop-file-utils
          version: 1.0

      - name: Install npm deps + stage bridge runtime
        run: npm ci

      - name: Inspect bundle layout (sizes + file count)
        run: |
          echo "=== bridge/node_modules size ==="
          du -sh src-tauri/bridge/node_modules
          echo "=== bridge/node_modules file count ==="
          find src-tauri/bridge/node_modules -type f | wc -l
          echo "=== top-level entries ==="
          ls -la src-tauri/bridge/node_modules/
          echo "=== largest files ==="
          find src-tauri/bridge/node_modules -type f -size +5M -exec ls -lh {} \; | head -20

      - name: Build AppImage with maximum verbosity
        run: |
          set -x
          # The verbose flag on tauri-cli reveals which subcommands are
          # being invoked.  Combined with RUST_LOG=trace, we should see
          # linuxdeploy's argv and any stderr it produces.
          TARGET="${{ inputs.arch == 'aarch64' && 'aarch64-unknown-linux-gnu' || 'x86_64-unknown-linux-gnu' }}"
          npx tauri build --target "$TARGET" --bundles appimage --verbose 2>&1 | tee /tmp/appimage-build.log
        continue-on-error: true

      - name: Hunt for linuxdeploy logs
        if: always()
        run: |
          set +e
          echo "=== /tmp/*.log ==="
          ls -la /tmp/*.log 2>/dev/null || true
          echo
          echo "=== linuxdeploy under cargo cache ==="
          find ~/.cargo -path "*linuxdeploy*" 2>/dev/null | head -20
          echo
          echo "=== AppDir created? ==="
          find src-tauri/target -path "*appimage*" -type d 2>/dev/null
          echo
          echo "=== AppDir tail of any run log ==="
          find src-tauri/target -path "*appimage*" -name "*.log" -exec echo "----- {} -----" \; -exec cat {} \; 2>/dev/null

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: appimage-debug-${{ inputs.arch }}
          path: |
            /tmp/appimage-build.log
            src-tauri/target/**/appimage/**
          retention-days: 14
          if-no-files-found: warn
